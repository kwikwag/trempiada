services:
  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_PATH: /app/data/trempbot.db
      OSRM_URL: http://osrm:5000
    volumes:
      - bot_data:/app/data
    depends_on:
      osrm:
        condition: service_healthy

  osrm:
    image: osrm/osrm-backend:latest
    restart: unless-stopped
    volumes:
      - osrm_data:/data
    # Requires Israel OSM data to be preprocessed first.
    # Run scripts/setup-osrm.sh once before starting with docker compose up.
    command: osrm-routed --algorithm mld --max-table-size 1000 /data/israel.osrm
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 5s

volumes:
  bot_data:
  osrm_data:
    external: true
    name: trempbot_osrm_data
